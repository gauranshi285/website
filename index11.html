<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100vw;
            height:100vh;
            background-color: beige;
            border: 5px solid black;
        }
        .box1{
            width:350px;
            height:80px;
            background-color: blue;
            border: 3px solid yellow;
            border-radius: 10px;
            margin: 10px;
            position: relative;
            animation-name: rightMovement;
            animation-duration:2s ;
            animation-iteration-count:1;
            animation-delay: 1s;
            animation-timing-function: cubic-bezier(1,-0.4,1,1);
            animation-direction:alternate-reverse;
            animation-fill-mode: backwards;
            animation: 5s linear 1s infinite alternate none running rightMovement;



        }
        .box2{
            width:350px;
            height:80px;
            background-color: blue;
            border: 3px solid yellow;
            border-radius: 10px;
            margin: 10px;
            position: relative;
             animation: 5s linear 1s infinite alternate none paused running LeftMovement;

        }
        #circle{
            width:100px;
            height:100px;
            background-color: blue;
            border: 3px solid yellow;
            border-radius: 50px;
            margin: 10px;
            position: relative;
            top:30%;
            left:40% ;
             animation: 5s ease-in-out 0s infinite alternate none running circleMovement;

        }
         @keyframes circleMovememnt {
          0%{
             top:1%;
                left:5%;
          }
          30%{ top:5%;
                left: 90%;;
          }
          60%{ 
            top:70%;
                left:10%;
          }
          100%{
             top:75%;
                left:90%;

          }
            
        }
         @keyframes leftMovememnt {
            from{
                top:650px;
                left:1350px;
            }
            to{
                top:680px;
                left: 0px;
            }
            
        }
        @keyframes rightMovememnt {
            from{
                top:0;
                left:0;
            }
            to{
                top:0;
                left: 1350px;
            }
            
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1"></div>
             <div id="circle"></div>
            <div class="box2"></div>
    
    
</body>
</html>
