<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>second card</title>
</head>
<body>
     <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100%;
            height: 100%;
            min-width: 900px;
            background-color: #8BC6EC;
            background-image: linear-gradient(135deg,#8BC6EC, 0%,#9599E2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card{
            width: 400px;
            height:600px;
            background-color: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .card img{
            width:100%;
            height: 30%;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;

            }
            .textbox{
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 15px;
                width: 75%;
                text-align: center;
            }
            #amountbox{
                width: 80%;
                height: 10%;
                background-color: #8BC6EC;
                border-radius: 10px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding-right: 20px;
                padding-left: 20px;
            }
            #paymentbutton{
                width: 80%;
                height: 9%;
                background-color: rgb(22,22,79);
                color:white;
                border-radius:10px;
                box-shadow: 0 10px 20px rgba(0,0,0.19), 0 6px 6px rgba(0,0,0,0.23);
            }
            .cancelbox{
                text-decoration: none;
                color:rgb(46,43,43);
                font-weight: bold;
                font-size: large;

            }
            #leftbox{
                height: 100%;
                width: fit-content;
                display: flex;
                gap:15px;
                align-items: center;
            }
            .imgbox{
                height: 3.5rem;
                width: 3.5rem;

            }
        
        </style>
</body>
<div class="container">
    <div class="card">
        <img src="purepng.com-photos-iconsymbolsiconsapple-iosiosios-8-iconsios-8-721522596102asedt.png"/>
        <div class="textbox">
        <h2> oreder summary</h2>
        <p> Lorem ipsum, dolor sit amet consectetur adipisicing elit. Debitis, fugiat animi. Blanditiis sed mollitia voluptas architecto impedit fugit esse dignissimos.</p>
    </div>
    <div id="amountbox">
        <div id="leftbox">
            <div class="imgbox">
                <img src="music.jpg"/>
            </div>
            <div id="textamountbox">
                <p>amount</p>
                <p>$99.9/year</p>
            </div>
        </div>
        <div class="rightbox">
            <a href="#">change</a>
        </div>
    </div>
    <button id="paymentbutton">
        proced to payment

    </button>
    <div class="cancelbox">
        <a href="#">cancel order</a>
    </div>
    </div>
</div>
</html>
