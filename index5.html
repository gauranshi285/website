<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding: 0;
        }
        .box{
            border: 2px solid red;
            width:25px;
        }
        .parent{
            border: 1px solid black;
            background-color: beige;
            width: 50px;;
        }
        .child{
            border: 1px solid black;
            background-color: aqua;
            width: 20px;
        }
        .container{
            border: 1px solid green;
            background-color: beige;
            height:100vh;
            width:50vw;
        }
        .box1{
            border: 1px solid black;
            font-size: 100px;
        }
        .container{
            font-size: 10px;
        }
        .box{
            font-size: 10em;
        }
        .firstpara{
            border: 1px solid black;
            font-size: 5rem;
        }
    </style>
</head>
<body>
    <div class="box">
        welcome to codehelp
    </div>
    <div class="parent">
        <div class="child">CHILD</div>
    </div>
    <div class="container">
        welcome to codehelp
    </div>
    <div class="box1">gauranshi agarwal</div>
    <p class="firstpara">gauranshi</p>
    <div class="container">
        <div class="box">welcome to codehelp</div>
    </div>
</body>
</html>
