<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=.container, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            background-color: beige;
            border :5px solid black;
            margin: 2px;
            padding:2px;
            flex-direction: row;
            height:800px;
            flex-wrap: wrap;
            justify-content:start;
           align-items: start;
           align-content: center;

        }
        .box{
            width: 200px;
            height: 200px;
              border :2px solid blue;
              margin:2px;
              padding: 2px;

        }
        #box1{
            background-color: aqua;
            order:500;
            flex-shrink: 4;
            flex-grow:1;
            align-self: center;
        }
        #box2{
            background-color: blue;
             flex-grow:1;
        }
        #box3{
            background-color: orange;
             flex-grow:1;
        }
        #box4{
             background-color: brown;
             order:-1;
              flex-grow:1;
              flex-basis:400px;
        }
    </style>

</head>
<body>
    <div class="container">
        <div class="box" id="box1">Box1</div>
        <div class="box" id="box2">Box2</div>
        <div class="box" id="box3">Box3</div>
        <div class="box" id="box4">Box4</div>
    </div>
    
</body>
</html>
